<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ContentAI Studio — Erreur</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
    .grad-bg { background: linear-gradient(90deg,#6366f1,#a855f7,#ec4899); }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen flex items-center justify-center px-6">
  <div class="max-w-md w-full bg-white border border-gray-200 rounded-2xl shadow-sm p-8 text-center">
    <div class="text-4xl mb-4">⚠️</div>
    <h1 class="text-xl font-bold mb-2">{{ title or "Une erreur est survenue" }}</h1>
    <p class="text-sm text-gray-500 mb-6">
      {{ message or "Erreur du nombre de connexions, contactez le support." }}
    </p>
    <div class="flex items-center justify-center gap-3">
      <a href="/library" class="text-sm font-medium border border-gray-300 rounded-xl px-5 py-2.5 hover:border-gray-900">Retour</a>
      <a href="mailto:agence.marketflow@gmail.com" class="text-sm font-medium text-white grad-bg rounded-xl px-5 py-2.5">Contacter le support</a>
    </div>
  </div>
</body>
</html>
