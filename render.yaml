services:
  - type: web
    name: contentai-studio
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: ZERNIO_API_KEY
        sync: false        # à renseigner dans le dashboard Render (secret)
      - key: GROQ_API_KEY
        sync: false        # à renseigner dans le dashboard Render (secret)
      - key: DATABASE_URL
        sync: false        # Internal Database URL de contentai-studio-db
      - key: SESSION_SECRET
        generateValue: true
